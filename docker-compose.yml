version: '3.8'
services:
  app:
    build: .
    image: klinikos-app
    container_name: klinikos-app
    restart: unless-stopped
    env_file:
      - .env
    # Remove volume mount to avoid Mac ._ file issues
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis
    ports:
      - "9000:9000"
  db:
    image: postgres:15
    container_name: klinikos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: klinikos
      POSTGRES_USER: klinikos
      POSTGRES_PASSWORD: klinikos
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_buffers=256MB", "-c", "work_mem=16MB"]
  redis:
    image: redis:alpine
    container_name: klinikos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
  nginx:
    image: nginx:alpine
    container_name: klinikos-nginx
    restart: unless-stopped
    ports:
      - "8181:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
volumes:
  db_data:
